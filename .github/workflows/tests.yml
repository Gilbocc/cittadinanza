name: Tests And Prompts

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile prompts
        run: python compile_prompts.py

      - name: Verify compiled prompts are committed
        run: git diff --exit-code -- prompts/compiled

      - name: Run tests
        run: python -m unittest discover -s test -v
